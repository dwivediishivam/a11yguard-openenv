<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoStream - Gallery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #111; color: #fff; }
        header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        header h1 { font-size: 1.4rem; }
        .toolbar { display: flex; gap: 10px; }
        .toolbar button {
            background: #222;
            border: 1px solid #444;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toolbar button:hover { background: #333; }
        main { padding: 30px 40px; }
        h2 { margin-bottom: 20px; font-weight: 400; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .gallery-item { border-radius: 8px; overflow: hidden; background: #222; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; color: #555; font-size: 0.9rem; }
        footer { text-align: center; padding: 30px; color: #555; border-top: 1px solid #222; margin-top: 40px; }
    </style>
</head>
<body>
    <header>
        <h1>PhotoStream</h1>
        <div class="toolbar">
            <button>🔍</button>
            <button>⬆️</button>
            <button>❤️</button>
            <button>☰</button>
        </div>
    </header>
    <main>
        <h2>Your Library</h2>
        <div class="gallery">
            <div class="gallery-item">Sunset Beach</div>
            <div class="gallery-item">Mountain View</div>
            <div class="gallery-item">City Lights</div>
            <div class="gallery-item">Forest Trail</div>
            <div class="gallery-item">Ocean Waves</div>
            <div class="gallery-item">Snow Peaks</div>
        </div>
    </main>
    <footer>
        <p>&copy; 2025 PhotoStream</p>
    </footer>
</body>
</html>
