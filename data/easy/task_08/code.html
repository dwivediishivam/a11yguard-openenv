<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVibe - Watch Now</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; }
        header { padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); }
        header h1 { font-size: 1.4rem; color: #e50914; }
        nav a { color: #ccc; text-decoration: none; margin-left: 20px; font-size: 0.9rem; }
        .hero { padding: 60px 40px; max-width: 800px; }
        .hero h2 { font-size: 2.5rem; margin-bottom: 15px; }
        .hero p { color: #aaa; line-height: 1.6; margin-bottom: 20px; max-width: 500px; }
        .hero button { background: #e50914; color: white; border: none; padding: 12px 30px; font-size: 1.1rem; border-radius: 4px; cursor: pointer; }
        .video-section { padding: 20px 40px; }
        .video-section h3 { margin-bottom: 15px; }
        footer { text-align: center; padding: 40px; color: #555; }
    </style>
</head>
<body>
    <header>
        <h1>StreamVibe</h1>
        <nav>
            <a href="/home">Home</a>
            <a href="/movies">Movies</a>
            <a href="/series">Series</a>
        </nav>
    </header>
    <div class="hero">
        <h2>Featured: The Last Frontier</h2>
        <p>A gripping sci-fi drama about humanity's journey to colonize Mars. When the first settlers encounter unexpected challenges, they must decide what it truly means to build a new home.</p>
        <button>▶ Play Now</button>
    </div>
    <div class="video-section">
        <h3>Trailer</h3>
        <video width="700" autoplay>
            <source src="trailer.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    <footer>
        <p>&copy; 2025 StreamVibe Entertainment</p>
    </footer>
</body>
</html>
